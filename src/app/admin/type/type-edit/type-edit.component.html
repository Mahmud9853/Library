<div class="container mt-5">
    <h2 class="mb-4">Edit Type</h2>
    <form (ngSubmit)="updateType()">
      <div class="mb-3">
        <label for="name" class="form-label">Tipi:</label>
        <input
          id="name"
          type="text"
          class="form-control"
          [(ngModel)]="type.name"
          name="name"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary">Update Type</button>
    </form>
  </div>
